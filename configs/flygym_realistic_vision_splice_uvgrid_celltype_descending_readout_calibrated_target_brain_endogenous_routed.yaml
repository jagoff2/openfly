body:
  terrain_type: flat
  leading_fly_speed: 15.0
  leading_fly_radius: 10.0
  target_fly_enabled: true
  target_initial_phase_rad: 0.0
  target_angular_direction: 1.0
brain_context:
  mode: none
encoder:
  visual_base_hz: 0.0
  visual_gain_hz: 0.0
  visual_looming_gain_hz: 0.0
  mech_base_hz: 0.0
  yaw_gain_hz: 70.0
  speed_gain_hz: 25.0
  contact_gain_hz: 15.0
  accel_gain_hz: 18.0
  state_gain_hz: 18.0
  transition_gain_hz: 22.0
  exafference_gain_hz: 10.0
  stop_suppression_hz: 8.0
visual_splice:
  enabled: true
  annotation_path: outputs/cache/flywire_annotation_supplement.tsv
  spatial_mode: uv_grid
  spatial_u_bins: 2
  spatial_v_bins: 2
  spatial_flip_v: true
  spatial_mirror_u_by_side: true
  spatial_cell_type_transforms_path: outputs/metrics/splice_celltype_alignment_recommended.json
  min_roots_per_bin: 20
  value_scale: 62.96215524698159
  max_abs_current: 120.0
  baseline_update_alpha: 0.0
  temporal_delta_scale: 2.0
decoder:
  forward_gain: 1.2
  turn_gain: 0.65
  signal_smoothing_alpha: 0.06
  forward_asymmetry_scale_hz: 40.0
  forward_asymmetry_turn_gain: 0.3
  population_candidates_json: outputs/metrics/descending_readout_candidates_strict.json
  population_forward_cell_types:
    - DNp103
    - DNp06
    - DNp18
    - DNp35
  population_turn_cell_types:
    - DNpe056
    - DNp71
    - DNpe040
  population_forward_scale_hz: 60.0
  population_turn_scale_hz: 25.0
  population_forward_weight: 1.0
  population_turn_weight: 0.75
  monitor_candidates_json: outputs/metrics/jump_brain_driven_relay_monitor_candidates.json
  turn_voltage_signal_library_json: outputs/metrics/jump_brain_driven_turn_latent_2s_spontaneous_refit_library.json
  turn_voltage_weight: 0.3
runtime:
  seed: 0
  duration_s: 2.0
  body_timestep_s: 0.0001
  control_interval_s: 0.002
  initial_left_drive: 0.0
  initial_right_drive: 0.0
  force_cpu_vision: true
  vision_payload_mode: fast
  video_stride: 5
  video_fps: 24
