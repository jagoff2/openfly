brain:
  backend: torch
  completeness_path: external/fly-brain/data/2025_Completeness_783.csv
  connectivity_path: external/fly-brain/data/2025_Connectivity_783.parquet
  cache_dir: outputs/cache
  device: cpu
  dt_ms: 0.1
body:
  terrain_type: flat
  leading_fly_speed: 15.0
  leading_fly_radius: 10.0
brain_context:
  mode: none
visual_splice:
  enabled: true
  annotation_path: outputs/cache/flywire_annotation_supplement.tsv
  spatial_mode: axis1d
  spatial_bins: 4
  min_roots_per_bin: 20
  value_scale: 101.94613788960949
  max_abs_current: 120.0
  baseline_update_alpha: 0.0
decoder:
  forward_gain: 0.75
  turn_gain: 0.3
  signal_smoothing_alpha: 0.12
  relay_candidates_json: outputs/metrics/splice_relay_candidates.json
  relay_forward_cell_types:
    - LC31b
    - LCe06
    - LT82a
  relay_turn_cell_types:
    - LCe06
  relay_forward_scale_hz: 70.0
  relay_turn_scale_hz: 20.0
  relay_forward_weight: 1.0
  relay_turn_weight: 0.4
runtime:
  seed: 0
  duration_s: 2.0
  body_timestep_s: 0.0001
  control_interval_s: 0.002
  initial_left_drive: 0.0
  initial_right_drive: 0.0
  force_cpu_vision: true
  vision_payload_mode: fast
  video_stride: 5
  video_fps: 24
