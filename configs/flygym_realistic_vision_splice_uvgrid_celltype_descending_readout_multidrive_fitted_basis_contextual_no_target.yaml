brain:
  backend: torch
  completeness_path: external/fly-brain/data/2025_Completeness_783.csv
  connectivity_path: external/fly-brain/data/2025_Connectivity_783.parquet
  cache_dir: outputs/cache
  device: cpu
  dt_ms: 0.1
body:
  terrain_type: flat
  leading_fly_speed: 15.0
  leading_fly_radius: 10.0
  target_fly_enabled: false
brain_context:
  mode: none
visual_splice:
  enabled: true
  annotation_path: outputs/cache/flywire_annotation_supplement.tsv
  spatial_mode: uv_grid
  spatial_u_bins: 2
  spatial_v_bins: 2
  spatial_flip_v: true
  spatial_mirror_u_by_side: true
  spatial_cell_type_transforms_path: outputs/metrics/splice_celltype_alignment_recommended.json
  min_roots_per_bin: 20
  value_scale: 62.96215524698159
  max_abs_current: 120.0
  baseline_update_alpha: 0.0
decoder:
  command_mode: hybrid_multidrive
  forward_gain: 1.2
  turn_gain: 0.65
  signal_smoothing_alpha: 0.06
  forward_asymmetry_scale_hz: 40.0
  forward_asymmetry_turn_gain: 0.3
  latent_freq_bias: 0.9
  latent_freq_gain: 0.55
  latent_turn_amp_gain: 0.3
  latent_turn_freq_gain: 0.2
  latent_retraction_base: 1.0
  latent_stumbling_base: 1.0
  latent_retraction_turn_gain: 0.35
  latent_stumbling_turn_gain: 0.5
  latent_retraction_reverse_gain: 0.4
  latent_stumbling_reverse_gain: 0.75
  population_candidates_json: outputs/metrics/descending_readout_candidates_strict.json
  motor_basis_json: outputs/metrics/neck_output_motor_basis.json
  population_forward_scale_hz: 60.0
  population_turn_scale_hz: 25.0
  population_forward_weight: 1.0
  population_turn_weight: 0.75
  forward_context_cell_types:
    - DNae002
    - DNpe016
  forward_context_scale_hz: 5.0
  forward_context_mode: boost
  forward_context_blend: 0.0
  forward_context_boost: 0.35
  turn_context_cell_types:
    - DNpe040
    - DNpe056
  turn_context_scale_hz: 20.0
  turn_context_mode: aligned_asymmetry
  turn_context_boost: 0.35
  latent_turn_priority_outer_amp_gain: 0.4
  latent_turn_priority_inner_amp_gain: 0.2
  latent_turn_priority_outer_freq_gain: 0.3
  latent_turn_priority_inner_freq_gain: 0.15
  monitor_candidates_json: outputs/metrics/descending_readout_candidates_strict.json
  monitor_cell_types:
    - DNae002
    - DNb01
    - DNg97
    - DNp09
    - DNp18
    - DNp35
    - DNp103
    - DNpe016
    - DNpe040
    - DNpe056
runtime:
  seed: 0
  duration_s: 2.0
  body_timestep_s: 0.0001
  control_interval_s: 0.002
  initial_left_drive: 0.0
  initial_right_drive: 0.0
  force_cpu_vision: true
  vision_payload_mode: fast
  control_mode: hybrid_multidrive
  video_stride: 5
  video_fps: 24
