brain:
  backend: torch
  completeness_path: external/fly-brain/data/2025_Completeness_783.csv
  connectivity_path: external/fly-brain/data/2025_Connectivity_783.parquet
  cache_dir: outputs/cache
  device: cpu
  dt_ms: 0.1
body:
  terrain_type: flat
  leading_fly_speed: 15.0
  leading_fly_radius: 10.0
  target_fly_enabled: false
brain_context:
  mode: none
visual_splice:
  enabled: true
  annotation_path: outputs/cache/flywire_annotation_supplement.tsv
  spatial_mode: uv_grid
  spatial_u_bins: 2
  spatial_v_bins: 2
  spatial_flip_v: true
  spatial_mirror_u_by_side: true
  spatial_cell_type_transforms_path: outputs/metrics/splice_celltype_alignment_recommended.json
  min_roots_per_bin: 20
  value_scale: 62.96215524698159
  max_abs_current: 120.0
  baseline_update_alpha: 0.0
decoder:
  forward_gain: 1.2
  turn_gain: 0.65
  signal_smoothing_alpha: 0.06
  forward_asymmetry_scale_hz: 40.0
  forward_asymmetry_turn_gain: 0.3
  population_candidates_json: outputs/metrics/descending_readout_candidates_strict.json
  population_forward_cell_types:
    - DNp103
    - DNp06
    - DNp18
    - DNp35
  population_turn_cell_types:
    - DNpe056
    - DNp71
    - DNpe040
  population_forward_scale_hz: 60.0
  population_turn_scale_hz: 25.0
  population_forward_weight: 1.0
  population_turn_weight: 0.75
  monitor_candidates_json: outputs/metrics/relay_turn_voltage_monitor_candidates.json
shadow_decoders:
  - label: shadow_vnc_exit_nerve_semantic
    decoder:
      type: vnc_structural_spec
      spec_json: outputs/metrics/manc_thoracic_structural_spec_exit_nerve_flywire_semantic.json
      min_total_weight: 1.0
      monitor_top_channels: 12
      monitor_reduce: mean
  - label: shadow_turn_voltage_all
    decoder:
      type: voltage_turn_shadow
      signal_library_json: outputs/metrics/target_specific_turn_voltage_signal_library_0p2s.json
      turn_scale_mv: 5.0
      turn_gain: 0.65
      signal_smoothing_alpha: 0.06
  - label: shadow_turn_voltage_visual_only
    decoder:
      type: voltage_turn_shadow
      signal_library_json: outputs/metrics/target_specific_turn_voltage_signal_library_visual_only_0p2s.json
      turn_scale_mv: 5.0
      turn_gain: 0.65
      signal_smoothing_alpha: 0.06
steering_promotion:
  enabled: true
  shadow_label: shadow_turn_voltage_visual_only
  mode: blend
  turn_blend: 0.4
  shadow_turn_scale: 0.5
  max_abs_turn_state: 1.0
runtime:
  seed: 0
  duration_s: 2.0
  body_timestep_s: 0.0001
  control_interval_s: 0.002
  initial_left_drive: 0.0
  initial_right_drive: 0.0
  force_cpu_vision: true
  vision_payload_mode: fast
  video_stride: 5
  video_fps: 24
